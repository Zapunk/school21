apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: zapunk1/s21-gateway:v3
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: my-config
            - secretRef:
                name: my-secrets